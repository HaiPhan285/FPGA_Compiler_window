name: Publish Toolchain Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare setup environment
        shell: pwsh
        run: .\fpga.bat setup

      - name: Package bundle
        shell: pwsh
        run: .\fpga.bat package -Force -SkipSetup

      - name: Publish release asset
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "toolchain-bundle"
          $asset = "dist\nexys-a7-100t-toolchain-windows.zip"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $asset `
              --repo $env:GITHUB_REPOSITORY `
              --title "Toolchain Bundle" `
              --notes "Windows bundle for clone + setup + build."
          } else {
            gh release upload $tag $asset --clobber --repo $env:GITHUB_REPOSITORY
          }
