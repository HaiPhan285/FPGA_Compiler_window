name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - '.toolchain/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fpga-compiler:latest
            ${{ secrets.DOCKER_USERNAME }}/fpga-compiler:${{ github.run_number }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fpga-compiler:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fpga-compiler:buildcache,mode=max
