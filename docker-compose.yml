services:
  fpga-compiler:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    entrypoint: /usr/bin/pwsh -NoProfile -ExecutionPolicy Bypass
    # Usage: docker-compose run fpga-compiler -File scripts/fpga.ps1 build -Project lab2
